<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đóng góp ý kiến cho thư viện</title>
</head>
<body>

    <h2>Đóng góp ý kiến cho thư viện của nhà trường</h2>

    <form action="Bai7-NV3.html" method="get">
        
        <h3>1. Thông tin về người góp ý</h3>
        Họ và tên: <input type="text" name="txtHoTen" required><br><br>
        Địa chỉ email: <input type="email" name="txtEmail" required><br>

        <hr>

        <h3>2. Đóng góp ý kiến</h3>
        Ý kiến đóng góp: <br>
        <textarea name="txtYKien" rows="5" cols="45" placeholder="Nhập ý kiến của bạn tại đây..."></textarea>
        <br><br>

        <strong>Thể loại cần bổ sung thêm sách:</strong><br>
        <input type="checkbox" name="chk1" value="TruyenNgan"> Truyện ngắn <br>
        <input type="checkbox" name="chk2" value="KiNang"> Kĩ năng sống <br>
        <input type="checkbox" name="chk3" value="CNTT"> Công nghệ thông tin <br>
        <input type="checkbox" name="chk4" value="TruyenTranh"> Truyện tranh <br>
        <input type="checkbox" name="chk5" value="LichSu"> Lịch sử <br>
        <br>

        <input type="submit" name="cmd" value="Góp ý">
    </form>

</body>
</html>
